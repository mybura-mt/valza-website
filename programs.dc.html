document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ank\" style=\"margin-top:12px;border:1px solid #d9d5cd;text-align:center;padding:17px;letter-spacing:.06em\">Instagram<\/a>\n    <\/nav>\n  <\/div>\n<\/sc-if>\n\n\n<section style=\"position:relative;width:100%;height:clamp(360px,54vh,540px);min-height:360px;overflow:hidden;display:flex;align-items:flex-end\">\n  <div style=\"position:absolute;inset:0;animation:kenburns 24s ease-out infinite alternate\"><img id=\"programs-hero\" src=\"assets/images/programs-hero-v01.webp\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\" draggable=\"false\"><\/div>\n  <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.14) 44%,rgba(0,0,0,.55))\"><\/div>\n  <div style=\"position:relative;z-index:3;width:100%;max-width:1200px;margin:0 auto;padding:0 clamp(20px,4vw,60px) clamp(40px,6vh,64px);color:#fff\">\n    <span style=\"display:inline-block;font-family:Oswald;letter-spacing:.34em;font-size:11px;margin-bottom:16px;opacity:.92\">PROGRAMS<\/span>\n    <h1 style=\"font-family:'Shippori Mincho';font-weight:500;font-size:clamp(28px,4.4vw,52px);line-height:1.3;letter-spacing:.05em\">プログラム一覧。<\/h1>\n    <p style=\"margin-top:16px;max-width:560px;font-size:13px;line-height:2;opacity:.9;font-weight:300\">ボクシング・フィットネス・ヨガ・コンディショニングを組み合わせ、健康づくりから競技力向上、企業研修まで。<\/p>\n  <\/div>\n<\/section>\n<section style=\"background:#fff;padding:clamp(64px,10vh,140px) clamp(20px,4vw,60px)\">\n  <div style=\"max-width:1140px;margin:0 auto;display:flex;flex-direction:column;gap:clamp(56px,9vh,110px)\">\n    \n<div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:clamp(28px,4vw,64px);align-items:center;\">\n  <div style=\"direction:ltr;position:relative\"><img id=\"prog-health\" src=\"assets/images/program-detail-health.webp\" alt=\"\" style=\"width:100%;aspect-ratio:4/3;display:block;object-fit:cover\" draggable=\"false\"><span style=\"position:absolute;top:-16px;left:-2px;font-family:Oswald;font-weight:300;font-size:60px;color:#e6e1d7;line-height:1\">01<\/span><\/div>\n  <div style=\"direction:ltr\">\n    <span style=\"display:inline-block;font-family:Oswald;font-size:11px;letter-spacing:.22em;color:#a08850;margin-bottom:14px\">FOR HEALTH<\/span>\n    <h3 style=\"font-family:'Shippori Mincho';font-weight:600;font-size:clamp(21px,2.6vw,32px);line-height:1.45;letter-spacing:.03em;margin-bottom:16px\">健康のためのプログラム<\/h3>\n    <p style=\"font-size:14px;line-height:2.2;color:#666;font-weight:300;margin-bottom:22px;max-width:520px\">運動初心者・女性・シニアも安心。身体診断をもとに、姿勢・体力・体型を目的別に整える機能的トレーニングで、毎日を軽やかにします。<\/p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:0\"><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">ダイエット<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">姿勢改善<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">体力向上<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">健康維持<\/span><\/div>\n    \n  <\/div>\n<\/div>\n    \n<div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:clamp(28px,4vw,64px);align-items:center;direction:rtl\">\n  <div style=\"direction:ltr;position:relative\"><img id=\"prog-athlete\" src=\"assets/images/program-detail-athlete.webp\" alt=\"\" style=\"width:100%;aspect-ratio:4/3;display:block;object-fit:cover\" draggable=\"false\"><span style=\"position:absolute;top:-16px;left:-2px;font-family:Oswald;font-weight:300;font-size:60px;color:#e6e1d7;line-height:1\">02<\/span><\/div>\n  <div style=\"direction:ltr\">\n    <span style=\"display:inline-block;font-family:Oswald;font-size:11px;letter-spacing:.22em;color:#a08850;margin-bottom:14px\">FOR ATHLETE<\/span>\n    <h3 style=\"font-family:'Shippori Mincho';font-weight:600;font-size:clamp(21px,2.6vw,32px);line-height:1.45;letter-spacing:.03em;margin-bottom:16px\">アスリート向けプログラム<\/h3>\n    <p style=\"font-size:14px;line-height:2.2;color:#666;font-weight:300;margin-bottom:22px;max-width:520px\">競技力向上に特化。身体の使い方・パワー・スピード・コンディショニングを科学的に設計し、本番で結果を出す身体をつくります。<\/p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:0\"><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">パフォーマンス向上<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">フィジカル強化<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">ケガ予防<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">コンディショニング<\/span><\/div>\n    \n  <\/div>\n<\/div>\n    \n<div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:clamp(28px,4vw,64px);align-items:center;\">\n  <div style=\"direction:ltr;position:relative\"><img id=\"prog-kids\" src=\"assets/images/program-detail-kids.webp\" alt=\"\" style=\"width:100%;aspect-ratio:4/3;display:block;object-fit:cover\" draggable=\"false\"><span style=\"position:absolute;top:-16px;left:-2px;font-family:Oswald;font-weight:300;font-size:60px;color:#e6e1d7;line-height:1\">03<\/span><\/div>\n  <div style=\"direction:ltr\">\n    <span style=\"display:inline-block;font-family:Oswald;font-size:11px;letter-spacing:.22em;color:#a08850;margin-bottom:14px\">FOR KIDS<\/span>\n    <h3 style=\"font-family:'Shippori Mincho';font-weight:600;font-size:clamp(21px,2.6vw,32px);line-height:1.45;letter-spacing:.03em;margin-bottom:16px\">キッズ向けプログラム<\/h3>\n    <p style=\"font-size:14px;line-height:2.2;color:#666;font-weight:300;margin-bottom:22px;max-width:520px\"><strong style=\"color:#1a1a1a;font-weight:500\">運動神経は才能だけではない。<\/strong>ダイナミックストレッチ、アジリティ、神経トレーニング、ボクシングを通じて、あらゆるスポーツに対応できる身体の土台を育てます。<\/p>\n    <div style=\"display:flex;flex-w ;border-radius:2px\">メンタル<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">コンディショニング<\/span><\/div>\n    \n  <\/div>\n<\/div>\n    \n<div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:clamp(28px,4vw,64px);align-items:center;\">\n  <div style=\"direction:ltr;position:relative\"><img id=\"prog-yoga\" src=\"assets/images/program-detail-yoga.webp\" alt=\"\" style=\"width:100%;aspect-ratio:4/3;display:block;object-fit:cover\" draggable=\"false\"><span style=\"position:absolute;top:-16px;left:-2px;font-family:Oswald;font-weight:300;font-size:60px;color:#e6e1d7;line-height:1\">05<\/span><\/div>\n  <div style=\"direction:ltr\">\n    <span style=\"display:inline-block;font-family:Oswald;font-size:11px;letter-spacing:.22em;color:#a08850;margin-bottom:14px\">YOGA &amp; STUDIO<\/span>\n    <h3 style=\"font-family:'Shippori Mincho';font-weight:600;font-size:clamp(21px,2.6vw,32px);line-height:1.45;letter-spacing:.03em;margin-bottom:16px\">ヨガ＆スタジオプログラム<\/h3>\n    <p style=\"font-size:14px;line-height:2.2;color:#666;font-weight:300;margin-bottom:22px;max-width:520px\"><strong style=\"color:#1a1a1a;font-weight:500\">整えてから、動く。<\/strong>ヨガで身体と呼吸を整え、スタジオプログラムで楽しく身体を動かす。運動が苦手な方や初心者でも安心して参加できます。<\/p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:0\"><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">ヨガ<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">呼吸<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">スタジオプログラム<\/span><span style=\"font-size:12px;color:#555;border:1px solid #e2ded6;padding:8px 15px;border-radius:2px\">初心者歓迎<\/span><\/div>\n    \n  <\/div>\n<\/div>\n    \n<div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:clamp(28px,4vw x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { isMobile: false, menuOpen: false, scrolled: false };\n\n  componentDidMount() {\n    this._mq = window.matchMedia('(max-width: 880px)');\n    this._apply = () => this.setState({ isMobile: this._mq.matches, menuOpen: this._mq.matches ? this.state.menuOpen : false });\n    this._apply();\n    this._mq.addEventListener('change', this._apply);\n    this._onScroll = () => {\n      const s = window.scrollY > 60;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n  componentWillUnmount() {\n    if (this._mq) this._mq.removeEventListener('change', this._apply);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  renderVals() {\n    const sc = this.state.scrolled;\n    return {\n      isMobile: this.state.isMobile,\n      showDesktopNav: !this.state.isMobile,\n      menuOpen: this.state.menuOpen,\n      scrolled: sc,\n      navBg: sc ? 'rgba(255,255,255,.94)' : 'transparent',\n      navColor: sc ? '#1a1a1a' : '#ffffff',\n      navBorder: sc ? '1px solid #ece9e3' : '1px solid transparent',\n      navShadow: sc ? '0 1px 24px rgba(0,0,0,.05)' : 'none',\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
  <script>
    window.addEventListener('load', () => {
      const images = {
        'programs-hero': ['./assets/images/programs-hero-v01.png', '目的に合わせた多彩なトレーニングを提供するVALZAのプログラム'],
        'prog-health': ['./assets/images/program-detail-health.png', '健康のためのプログラム'],
        'prog-athlete': ['./assets/images/program-detail-athlete.png', 'アスリート向けプログラム'],
        'prog-kids': ['./assets/images/program-detail-kids.png', 'キッズ向けプログラム'],
        'prog-fighter': ['./assets/images/program-detail-fighter.png', '格闘家向けプログラム'],
        'prog-yoga': ['./assets/images/program-detail-yoga.png', 'ヨガ＆スタジオプログラム'],
        'prog-personal': ['./assets/images/program-detail-personal.png', 'パーソナルトレーニング'],
        'prog-corp': ['./assets/images/program-detail-corporate.png', '企業研修プログラム']
      };
      const mountProgramsImages = () => {
        let mounted = 0;
        Object.entries(images).forEach(([id, settings]) => {
          const slot = document.querySelector(`image-slot#${id}`);
          if (!slot) return;
          const image = document.createElement('img');
          image.id = id;
          image.src = settings[0];
          image.alt = settings[1];
          image.style.cssText = `${slot.getAttribute('style') || ''};object-fit:cover;object-position:center center;display:block;`;
          slot.replaceWith(image);
          mounted += 1;
        });
        return mounted;
      };
      const timer = window.setInterval(() => {
        mountProgramsImages();
        if (!document.querySelector('image-slot#programs-hero, image-slot[id^="prog-"]')) {
          window.clearInterval(timer);
        }
      }, 100);
      window.setTimeout(() => window.clearInterval(timer), 10000);
    });
  </script>
  <script>
    window.addEventListener('load', () => {
      const mountOfficialLogos = () => {
        [...document.querySelectorAll('span')].filter(element => element.textContent.trim() === 'VALZA' && !element.closest('.valza-hero-word-motion')).forEach((label, index) => {
          const container = label.parentElement;
          if (!container || container.querySelector('.valza-official-logo')) return;
          const logo = document.createElement('img');
          logo.className = 'valza-official-logo';
          logo.src = './assets/images/valza-official-logo.png';
          logo.alt = 'VALZA BOXING & FITNESS GYM';
          logo.style.cssText = `display:block;width:${index === 0 ? '168px' : '150px'};height:auto;mix-blend-mode:difference`;
          container.replaceChildren(logo);
        });
      };
      const timer = window.setInterval(() => mountOfficialLogos(), 100);
      window.setTimeout(() => window.clearInterval(timer), 10000);
    });
  </script>
</body>
</html>
